events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    upstream satellite_tracker { server satellite-tracker:8080; }
    upstream space_weather     { server space-weather:8001; }
    upstream astro_objects     { server astro-objects:8002; }
    upstream mission_data      { server mission-data:8003; }
    upstream user_service      { server user-service:8004; }

    server {
        listen 80;
        server_name localhost;

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API Gateway routes
        location /api/satellites {
            rewrite ^/api/satellites(.*) $1 break;
            proxy_pass http://satellite_tracker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/weather {
            rewrite ^/api/weather(.*) $1 break;
            proxy_pass http://space_weather;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/astro {
            rewrite ^/api/astro(.*) $1 break;
            proxy_pass http://astro_objects;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/missions {
            rewrite ^/api/missions(.*) $1 break;
            proxy_pass http://mission_data;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/users {
            rewrite ^/api/users(.*) $1 break;
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
