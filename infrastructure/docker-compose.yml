version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: space-data-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_pass
      - POSTGRES_DB=spacedata
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: